<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRAIL MÉTÉO — Roulabilité moto trail & enduro</title>
  <meta name="description" content="Dashboard météo orienté moto trail et enduro : indice de roulabilité par ville selon le vent, les rafales, la pluie et la visibilité." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <div class="wrap topbar-inner">
      <a class="brand" href="./" aria-label="Trail Météo, accueil">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28">
            <path d="M4 22h6l3-6 4 10 4-16 3 12h4" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="brand-text">TRAIL<em>MÉTÉO</em></span>
      </a>

      <form class="search" id="searchForm" role="search" autocomplete="off">
        <label class="visually-hidden" for="cityInput">Chercher une ville</label>
        <input
          type="text"
          id="cityInput"
          class="search-input"
          placeholder="Une ville où aller rouler…"
          aria-expanded="false"
          aria-controls="suggestions"
          aria-autocomplete="list" />
        <button type="submit" class="search-btn" aria-label="Lancer la recherche">
          <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path d="M21 21l-4.3-4.3M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
        <ul class="suggestions" id="suggestions" role="listbox" hidden></ul>
      </form>
    </div>
  </header>

  <main class="wrap" id="main">
    <!-- Favoris -->
    <nav class="favs" id="favs" aria-label="Villes enregistrées"></nav>

    <!-- État de chargement / erreur -->
    <div class="status" id="status" role="status" aria-live="polite"></div>

    <!-- Contenu principal, masqué tant qu'il n'y a pas de données -->
    <section class="dash" id="dash" hidden>

      <!-- Carte verdict (signature) -->
      <article class="verdict" id="verdict" aria-label="Indice de roulabilité">
        <div class="verdict-head">
          <div class="place">
            <h1 class="place-name" id="placeName">—</h1>
            <p class="place-sub" id="placeSub">—</p>
          </div>
          <button class="fav-toggle" id="favToggle" aria-pressed="false" title="Enregistrer cette ville">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M12 17.3 6.2 20.5l1.1-6.5L2.6 9.3l6.5-.9L12 2.5l2.9 5.9 6.5.9-4.7 4.7 1.1 6.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            <span>Enregistrer</span>
          </button>
        </div>

        <div class="gauge-block">
          <div class="gauge" id="gauge">
            <svg viewBox="0 0 200 120" class="gauge-svg" aria-hidden="true">
              <path class="gauge-track" d="M20 110 A80 80 0 0 1 180 110" fill="none" stroke-width="14" stroke-linecap="round"/>
              <path class="gauge-fill" id="gaugeFill" d="M20 110 A80 80 0 0 1 180 110" fill="none" stroke-width="14" stroke-linecap="round"/>
              <line class="gauge-needle" id="gaugeNeedle" x1="100" y1="110" x2="100" y2="42" stroke-width="3.5" stroke-linecap="round"/>
              <circle class="gauge-hub" cx="100" cy="110" r="7"/>
            </svg>
            <div class="gauge-center">
              <span class="gauge-score" id="gaugeScore">--</span>
              <span class="gauge-unit">/ 100</span>
            </div>
          </div>

          <div class="verdict-text">
            <span class="verdict-label">Roulabilité</span>
            <strong class="verdict-word" id="verdictWord">—</strong>
            <p class="verdict-note" id="verdictNote">—</p>
          </div>
        </div>

        <ul class="flags" id="flags" aria-label="Points de vigilance"></ul>
      </article>

      <!-- Tuiles métriques -->
      <h2 class="section-title">Conditions actuelles</h2>
      <div class="tiles" id="tiles"></div>

      <!-- Créneaux du jour -->
      <h2 class="section-title">Meilleurs créneaux aujourd'hui</h2>
      <div class="hours-scroll">
        <div class="hours" id="hours"></div>
      </div>

      <!-- Prévisions 7 jours -->
      <h2 class="section-title">Les 7 prochains jours</h2>
      <div class="days" id="days"></div>
    </section>
  </main>

  <footer class="footer">
    <div class="wrap footer-inner">
      <p>Données <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> · libres et gratuites.</p>
      <p class="footer-note">L'indice de roulabilité est indicatif. Adapte toujours ta conduite au terrain réel.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
